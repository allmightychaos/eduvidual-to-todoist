<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduvidual to Todoist Sync Status</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1f2937;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: #374151;
        }
        .status-box {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .success { background-color: #d1fae5; color: #065f46; }
        .error { background-color: #fee2e2; color: #991b1b; }
        .unknown { background-color: #f3f4f6; color: #6b7280; }
        .time-label {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 1rem;
        }
        .time-value {
            font-size: 1.125rem;
            font-weight: 500;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sync Status</h1>
        
        <div id="statusBox" class="status-box unknown">
            Checking status...
        </div>

        <div class="time-label">Latest Fetch:</div>
        <div id="timeValue" class="time-value">Loading...</div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/.netlify/functions/status');
                const data = await response.json();
                
                const statusBox = document.getElementById('statusBox');
                const timeValue = document.getElementById('timeValue');

                if (data.status === 'success') {
                    statusBox.textContent = '✅ Sync Successful';
                    statusBox.className = 'status-box success';
                } else if (data.status.includes('error')) {
                    statusBox.textContent = '❌ Sync Failed';
                    statusBox.className = 'status-box error';
                } else {
                    statusBox.textContent = '⏳ No Data Yet';
                    statusBox.className = 'status-box unknown';
                }

                if (data.timestamp) {
                    const date = new Date(data.timestamp);
                    timeValue.textContent = date.toLocaleString();
                } else {
                    timeValue.textContent = 'Never';
                }
            } catch (error) {
                document.getElementById('statusBox').textContent = '⚠️ Connection Error';
                document.getElementById('statusBox').className = 'status-box error';
                document.getElementById('timeValue').textContent = 'Could not load data';
            }
        }

        fetchStatus();
    </script>
</body>
</html>
