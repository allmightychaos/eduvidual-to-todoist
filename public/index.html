<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduvidual to Todoist Sync Status</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1f2937;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: #374151;
        }
        .status-box {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .success { background-color: #d1fae5; color: #065f46; }
        .error { background-color: #fee2e2; color: #991b1b; }
        .unknown { background-color: #f3f4f6; color: #6b7280; }
        svg.icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .time-label {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 1rem;
        }
        .time-value {
            font-size: 1.125rem;
            font-weight: 500;
            margin-top: 0.25rem;
            margin-bottom: 1.5rem;
        }
        .auth-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        input[type="password"] {
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.875rem;
        }
        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }
        button:hover {
            background-color: #4338ca;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spin {
            animation: spin 0.8s linear infinite;
            transform-origin: center;
        }
        .log-section {
            display: none;
            text-align: left;
            margin-top: 0.5rem;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        pre.log-viewer {
            background: #1f2937;
            color: #f3f4f6;
            padding: 1rem;
            border-radius: 6px;
            font-size: 0.75rem;
            overflow-x: auto;
            white-space: pre-wrap;
            margin: 0;
            border: 1px solid #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sync Status</h1>
        
        <div id="statusBox" class="status-box unknown">
            Checking status...
        </div>

        <div class="time-label">Latest Fetch:</div>
        <div id="timeValue" class="time-value">Loading...</div>

        <div class="auth-section">
            <!-- Login Form -->
            <div id="loginForm" style="display:flex; flex-direction:column; gap:0.5rem;">
                <div class="time-label" style="margin-top:0; margin-bottom: 0.25rem;">View Debug Details:</div>
                <input type="password" id="passwordInput" placeholder="Enter status password" onkeydown="if(event.key === 'Enter') fetchStatus(true)" />
                <button onclick="fetchStatus(true)">Unlock Details</button>
            </div>

            <!-- Error Logs -->
            <div id="logSection" class="log-section">
                <div class="log-header">
                    <div class="time-label" style="margin:0; font-weight:600;">Debug Logs:</div>
                    <button onclick="copyLogs()" style="padding: 0.25rem 0.5rem; font-size:0.75rem; background-color:#6b7280;">
                        <svg class="icon" style="width:14px; height:14px;" viewBox="0 0 24 24"><path d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z"/></svg>
                        Copy
                    </button>
                </div>
                <pre id="detailMessage" class="log-viewer"></pre>
                
                <button id="forceSyncBtn" onclick="triggerForceSync()" style="margin-top: 1rem; width: 100%; background-color: #059669;">
                    <svg class="icon" style="width:16px; height:16px;" viewBox="0 0 24 24"><path d="M12,18A6,6 0 0,1 6,12C6,11 6.25,10.03 6.7,9.2L5.24,7.74C4.46,8.97 4,10.43 4,12A8,8 0 0,0 12,20V23L16,19L12,15M12,4V1L8,5L12,9V6A6,6 0 0,1 18,12C18,13 17.75,13.97 17.3,14.8L18.76,16.26C19.54,15.03 20,13.57 20,12A8,8 0 0,0 12,4Z"/></svg>
                    Force Sync Now
                </button>
            </div>
        </div>
    </div>

    <script>
        const svgs = {
            success: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12S6.5 22 12 22 22 17.5 22 12 17.5 2 12 2M10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z"/></svg>',
            error: '<svg class="icon" viewBox="0 0 24 24"><path d="M12,2C17.53,2 22,6.47 22,12C22,17.53 17.53,22 12,22C6.47,22 2,17.53 2,12C2,6.47 6.47,2 12,2M15.59,7L12,10.59L8.41,7L7,8.41L10.59,12L7,15.59L8.41,17L12,13.41L15.59,17L17,15.59L13.41,12L17,8.41L15.59,7Z"/></svg>',
            unknown: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 20C16.4 20 20 16.4 20 12S16.4 4 12 4 4 7.6 4 12 7.6 20 12 20M12 2C17.5 2 22 6.5 22 12S17.5 22 12 22 2 17.5 2 12 6.5 2 12 2M12.5 7V12.2L17 14.9L16.2 16.3L11 13.2V7H12.5Z"/></svg>',
            warning: '<svg class="icon" viewBox="0 0 24 24"><path d="M13 14H11V9H13M13 18H11V16H13M1 21H23L12 2L1 21Z"/></svg>'
        };

        function setStatusUI(text, type) {
            const box = document.getElementById('statusBox');
            box.className = 'status-box ' + (type === 'warning' ? 'error' : type);
            box.innerHTML = svgs[type] + '<span>' + text + '</span>';
        }

        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                let date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "")  + expires + "; path=/; SameSite=Strict";
        }
        function getCookie(name) {
            let nameEQ = name + "=";
            let ca = document.cookie.split(';');
            for(let i=0;i < ca.length;i++) {
                let c = ca[i];
                while (c.charAt(0)==' ') c = c.substring(1,c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
            }
            return null;
        }

        function getNextExecutionTime() {
            const nextHour = new Date();
            nextHour.setHours(nextHour.getHours() + 1, 0, 0, 0);
            return nextHour.toLocaleString();
        }

        async function fetchStatus(isManualSubmit = false) {
            let pwdInput = document.getElementById('passwordInput').value;
            let storedPwd = getCookie('authPwd');
            
            let pwdToUse = isManualSubmit ? pwdInput : (storedPwd || '');

            try {
                // Add a cache-buster parameter to ensure we get live data
                const cacheBuster = new Date().getTime();
                let url = `/.netlify/functions/status?_t=${cacheBuster}`;
                if (pwdToUse) {
                    url += `&pwd=${encodeURIComponent(pwdToUse)}`;
                }

                const response = await fetch(url);
                const data = await response.json();
                
                const timeValue = document.getElementById('timeValue');
                const detailMessage = document.getElementById('detailMessage');
                const loginForm = document.getElementById('loginForm');
                const logSection = document.getElementById('logSection');

                // Time logic
                if (data.timestamp) {
                    timeValue.textContent = new Date(data.timestamp).toLocaleString();
                } else {
                    timeValue.textContent = 'Never';
                }

                // Authentication Logic
                if (data.isAuthenticated) {
                    // Valid auth
                    if (isManualSubmit && pwdToUse) setCookie('authPwd', pwdToUse, 30);
                    loginForm.style.display = 'none'; // Hide login fields completely

                    if (data.status === 'success') {
                        setStatusUI('Sync Successful', 'success');
                    } else if (data.status.includes('error')) {
                        setStatusUI('Sync Failed', 'error');
                    } else {
                        setStatusUI('No Data Yet', 'unknown');
                    }
                    
                    logSection.style.display = 'block';
                    
                    const latestFetchStr = data.timestamp ? new Date(data.timestamp).toLocaleString() : 'Never';
                    const nextFetchStr = getNextExecutionTime();
                    
                    let logText = `Status: ${data.status === 'success' ? 'Success' : data.status.includes('error') ? 'Error' : 'Unknown'}\n`;
                    logText += `Latest Fetch: ${latestFetchStr}\n`;
                    logText += `Next Planned Fetch: ${nextFetchStr}\n`;
                    logText += `Debug Log: ${JSON.stringify(data, null, 2)}`;
                    
                    if (data.status.includes('error')) {
                        logText += `\nError Log: ${data.message || data.status}`;
                    }
                    
                    detailMessage.textContent = logText;
                } else {
                    // Unauthenticated or invalid auth
                    if (isManualSubmit && pwdToUse) {
                        alert("Incorrect password!");
                        setCookie('authPwd', '', -1); // clear invalid cookie
                    }
                    
                    if (data.status === 'success') {
                        setStatusUI('Sync Successful', 'success');
                    } else if (data.status.includes('error')) {
                        setStatusUI('Sync Failed', 'error');
                    } else {
                        setStatusUI('No Data Yet', 'unknown');
                    }
                }

            } catch (error) {
                setStatusUI('Connection Error', 'warning');
                document.getElementById('timeValue').textContent = 'Could not load data';
            }
        }

        function copyLogs() {
            const logs = document.getElementById('detailMessage').textContent;
            navigator.clipboard.writeText(logs).then(() => {
                const btn = document.querySelector('.log-header button');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<svg class="icon" style="width:14px; height:14px;" viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg> Copied!';
                setTimeout(() => btn.innerHTML = originalText, 2000);
            });
        }

        async function triggerForceSync() {
            const btn = document.getElementById('forceSyncBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<svg class="icon spin" style="width:16px; height:16px;" viewBox="0 0 24 24"><path d="M12,4V2A10,10 0 0,0 2,12H4A8,8 0 0,1 12,4Z"/></svg> Syncing...';
            btn.disabled = true;
            btn.style.opacity = '0.7';
            btn.style.cursor = 'wait';

            let pwdToUse = getCookie('authPwd');
            try {
                const response = await fetch(`/do-sync?pwd=${encodeURIComponent(pwdToUse)}`, { method: 'POST' });
            } catch (error) {
                // fetchStatus() below will reflect the outcome
            }

            // Wait briefly to allow Netlify Blobs strong consistency to propagate
            await new Promise(r => setTimeout(r, 1500));
            await fetchStatus();

            btn.innerHTML = originalHtml;
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        }

        // Initial Load
        fetchStatus();
    </script>
</body>
</html>
